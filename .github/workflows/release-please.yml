name: Release Please

on:
  push:
    branches: [master]
  workflow_dispatch:

permissions:
  contents: write
  issues: write
  pull-requests: write

concurrency:
  group: release-please-${{ github.ref }}
  cancel-in-progress: true

jobs:
  release-please:
    runs-on: ubuntu-latest
    outputs:
      release_created: ${{ steps.release.outputs.release_created }}
      tag_name: ${{ steps.release.outputs.tag_name }}
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: 24

      - name: Run Release Please
        id: release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          REPO_URL: ${{ github.repository }}
          TARGET_BRANCH: ${{ github.ref_name }}
        run: |
          set -euo pipefail
          release_date="$(date -u +%Y%m%d)"
          before_tag="$(gh release list --limit 1 --json tagName --jq '.[0].tagName // ""')"

          npx -y release-please@17.10.1 release-pr \
            --token="$GITHUB_TOKEN" \
            --repo-url="$REPO_URL" \
            --target-branch="$TARGET_BRANCH" \
            --config-file=.github/release-please-config.json \
            --manifest-file=.github/.release-please-manifest.json \
            --release-as="${release_date}.0.0"

          npx -y release-please@17.10.1 github-release \
            --token="$GITHUB_TOKEN" \
            --repo-url="$REPO_URL" \
            --target-branch="$TARGET_BRANCH" \
            --config-file=.github/release-please-config.json \
            --manifest-file=.github/.release-please-manifest.json

          after_tag="$(gh release list --limit 1 --json tagName --jq '.[0].tagName // ""')"
          if [ -n "$after_tag" ] && [ "$after_tag" != "$before_tag" ]; then
            echo "release_created=true" >> "$GITHUB_OUTPUT"
            echo "tag_name=$after_tag" >> "$GITHUB_OUTPUT"
          else
            echo "release_created=false" >> "$GITHUB_OUTPUT"
            echo "tag_name=" >> "$GITHUB_OUTPUT"
          fi

  release-artifacts:
    needs: release-please
    if: ${{ needs.release-please.outputs.release_created == 'true' }}
    runs-on: ubuntu-24.04
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v6
        with:
          ref: ${{ needs.release-please.outputs.tag_name }}

      - name: Install build dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            autoconf \
            automake \
            autopoint \
            build-essential \
            gettext \
            intltool \
            libtool \
            perl

      - name: Build source distributions
        run: |
          set -euo pipefail
          git config --global --add safe.directory "$GITHUB_WORKSPACE"
          ./autogen.sh
          ./configure
          make -j"$(nproc)"
          make dist-gzip
          make dist-bzip2
          make dist-xz
          mkdir -p "$RUNNER_TEMP/release-artifacts"
          cp ddccontrol-db-*.tar.gz "$RUNNER_TEMP/release-artifacts/"
          cp ddccontrol-db-*.tar.bz2 "$RUNNER_TEMP/release-artifacts/"
          cp ddccontrol-db-*.tar.xz "$RUNNER_TEMP/release-artifacts/"

      - name: Upload source distributions
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ needs.release-please.outputs.tag_name }}
          files: |
            ${{ runner.temp }}/release-artifacts/ddccontrol-db-*.tar.gz
            ${{ runner.temp }}/release-artifacts/ddccontrol-db-*.tar.bz2
            ${{ runner.temp }}/release-artifacts/ddccontrol-db-*.tar.xz
